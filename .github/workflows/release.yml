name: Release

# Dispara em tags SemVer (PRD §27): v1.3.5
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

jobs:
  release:
    name: Publica release win-x64
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # release.ps1: limpa, testa, publica self-contained, gera version.json + SHA256SUM,
      # organiza release/ (PRD §26, §27, §30). Versão vem da tag (sem o 'v').
      - name: Build release
        shell: pwsh
        run: ./scripts/release.ps1 -Version ($env:GITHUB_REF_NAME -replace '^v', '')

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
